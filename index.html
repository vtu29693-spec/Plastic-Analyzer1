<!DOCTYPE html>
<html>
<head>
<title>Plastic Analyzer AI</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    width:420px;
    padding:25px;
    border-radius:20px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    box-shadow:0 0 40px rgba(0,0,0,0.7);
    text-align:center;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1;}
}

h1 {
    color:#00e6ff;
    text-shadow:0 0 10px #00e6ff;
}

.buttons button {
    margin:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

.buttons button:hover {
    transform:scale(1.1);
}

video, img {
    width:100%;
    border-radius:15px;
    margin-top:15px;
}

#result {
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    background:rgba(0,0,0,0.5);
    text-align:left;
}
</style>

</head>
<body>

<div class="container">

<h1>♻️ Plastic Analyzer AI</h1>

<div class="buttons">
    <input type="file" id="imageInput" accept="image/*" hidden>
    <button onclick="document.getElementById('imageInput').click()">📂 Upload</button>
    <button onclick="startCamera()">📷 Camera</button>
</div>

<video id="video" autoplay></video>
<button onclick="capture()">Capture</button>

<img id="preview">

<div id="result">Upload or capture image to analyze</div>

</div>

<script src="script.js"></script>

</body>
</html>
